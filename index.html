<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกหนังสือรับ - ชำผักแพว</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; margin: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        
        button { background-color: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; }
        button:hover { background-color: #219150; }
        button:disabled { background-color: #bdc3c7; }

        .table-container { margin-top: 30px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        th { background-color: #3498db; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f9f9f9; }
        
        .status { text-align: center; margin-top: 10px; font-weight: bold; }
        .loading { color: #f39c12; }
        .success { color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h2>ระบบบันทึกหนังสือรับ (เชื่อมต่อ Google Sheets)</h2>
    
    <div class="form-grid">
        <div class="form-group">
            <label>เลขรับ</label>
            <input type="text" id="docNum" placeholder="เช่น สบ 543xx/..." required>
        </div>
        <div class="form-group">
            <label>วันที่ออกหนังสือ</label>
            <input type="date" id="docDateOut">
        </div>
        <div class="form-group">
            <label>วันที่ลงรับ</label>
            <input type="date" id="docDateIn">
        </div>
        <div class="form-group">
            <label>จาก</label>
            <input type="text" id="docFrom" placeholder="หน่วยงานต้นทาง">
        </div>
        <div class="form-group" style="grid-column: span 2;">
            <label>ชื่อเรื่อง</label>
            <input type="text" id="docTitle" placeholder="กรอกชื่อเรื่องหนังสือ">
        </div>
        <div class="form-group">
            <label>ประเภทหนังสือ</label>
            <select id="docType">
                <option value="หนังสือภายนอก">หนังสือภายนอก</option>
                <option value="หนังสือภายใน">หนังสือภายใน</option>
                <option value="คำสั่ง/ประกาศ">คำสั่ง/ประกาศ</option>
            </select>
        </div>
        <div class="form-group">
            <label>ชั้นความเร็ว</label>
            <select id="docSpeed">
                <option value="ปกติ">ปกติ</option>
                <option value="ด่วน">ด่วน</option>
                <option value="ด่วนมาก">ด่วนมาก</option>
                <option value="ด่วนที่สุด">ด่วนที่สุด</option>
            </select>
        </div>
        <div class="form-group">
            <label>ผู้รับผิดชอบ</label>
            <input type="text" id="docOwner" placeholder="ชื่อเจ้าหน้าที่">
        </div>
        <div class="form-group">
            <label>หมวดหมู่</label>
            <input type="text" id="docCategory" placeholder="เช่น งานบริหาร, งานคลัง">
        </div>
        <div class="form-group" style="grid-column: span 2;">
            <label>ลิงก์ Google Drive</label>
            <input type="url" id="docLink" placeholder="วางลิงก์ไฟล์ PDF ที่นี่">
        </div>
    </div>

    <button id="btnSave" onclick="saveData()">บันทึกลงฐานข้อมูล</button>
    <div id="statusMsg" class="status"></div>

    <div class="table-container">
        <h3>ประวัติรายการล่าสุด</h3>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>เลขรับ</th>
                    <th>วันที่ลงรับ</th>
                    <th>จาก</th>
                    <th>ชื่อเรื่อง</th>
                    <th>ผู้รับผิดชอบ</th>
                    <th>ลิงก์</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyjve7y30MoL6RF4H4kcI0DAAMx5s38PIY7pdog1MlaY46tJ5hhgFoI9VbhQGciLGE/exec";

    // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
    window.onload = loadData;

    async function loadData() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>กำลังโหลดข้อมูล...</td></tr>";
        
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            tableBody.innerHTML = ""; // ล้างแถวเดิม
            
            // แสดงผล 10 รายการล่าสุด
            data.reverse().slice(0, 10).forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row['เลขรับ'] || '-'}</td>
                    <td>${row['วันที่ลงรับ'] || '-'}</td>
                    <td>${row['จาก'] || '-'}</td>
                    <td>${row['ชื่อเรื่อง'] || '-'}</td>
                    <td>${row['ผู้รับผิดชอบ'] || '-'}</td>
                    <td>${row['ลิงก์ Google Drive'] ? `<a href="${row['ลิงก์ Google Drive']}" target="_blank">เปิดดู</a>` : '-'}</td>
                `;
                tableBody.appendChild(tr);
            });
        } catch (error) {
            tableBody.innerHTML = "<tr><td colspan='6' style='text-align:center; color:red;'>ไม่สามารถดึงข้อมูลได้</td></tr>";
        }
    }

    async function saveData() {
        const btn = document.getElementById('btnSave');
        const status = document.getElementById('statusMsg');
        
        // เตรียมข้อมูล
        const payload = {
            docNum: document.getElementById('docNum').value,
            docDateOut: document.getElementById('docDateOut').value,
            docDateIn: document.getElementById('docDateIn').value,
            docFrom: document.getElementById('docFrom').value,
            docTitle: document.getElementById('docTitle').value,
            docType: document.getElementById('docType').value,
            docSpeed: document.getElementById('docSpeed').value,
            docOwner: document.getElementById('docOwner').value,
            docCategory: document.getElementById('docCategory').value,
            docLink: document.getElementById('docLink').value
        };

        if(!payload.docNum || !payload.docTitle) {
            alert("กรุณากรอกเลขรับและชื่อเรื่องก่อนบันทึก");
            return;
        }

        btn.disabled = true;
        status.innerHTML = "กำลังบันทึกข้อมูล...";
        status.className = "status loading";

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // จำเป็นสำหรับ Apps Script
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            status.innerHTML = "บันทึกสำเร็จ!";
            status.className = "status success";
            
            // ล้างฟอร์ม
            document.querySelectorAll('input').forEach(input => input.value = '');
            
            // โหลดข้อมูลใหม่
            setTimeout(() => {
                loadData();
                status.innerHTML = "";
                btn.disabled = false;
            }, 2000);

        } catch (error) {
            status.innerHTML = "เกิดข้อผิดพลาด: " + error.message;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
