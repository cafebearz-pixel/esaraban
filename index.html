<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SARABAN CPP</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Prompt',sans-serif;background:#f1f5f9;}
#sidebar{transition:.3s;}
.slider{overflow:hidden;position:relative;}
.slide-track{display:flex;transition:.4s;}
.slide{min-width:100%;object-fit:cover;}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<div id="sidebar" class="fixed md:static w-64 h-screen bg-blue-900 text-white p-5 z-50">

<!-- ☰ อยู่ตรงนี้ -->
<div class="flex justify-between items-center mb-6">
<h1 class="font-bold">eSaraban</h1>
<button onclick="toggleSidebar()" class="text-xl">☰</button>
</div>

<ul class="space-y-2 text-sm">
<li class="p-3 bg-yellow-400 text-black rounded-xl">หน้าหลัก</li>
<li class="p-3 hover:bg-blue-700 rounded-xl">หนังสือรับ</li>
<li class="p-3 hover:bg-blue-700 rounded-xl">หนังสือส่ง</li>
<li class="p-3 hover:bg-blue-700 rounded-xl">ใบคำร้อง</li>
<li class="p-3 hover:bg-blue-700 rounded-xl">สถานะต่างๆ</li>
<li class="p-3 hover:bg-blue-700 rounded-xl">เสร็จสิ้นแล้ว</li>
<li class="p-3 hover:bg-blue-700 rounded-xl">ปฏิทิน</li>
<li class="p-3 hover:bg-blue-700 rounded-xl">วิธีใช้งาน</li>
</ul>

</div>

<!-- MAIN -->
<div class="flex-1">

<!-- TOP -->
<div class="bg-blue-900 text-white p-4 text-center">
<h1 class="text-lg font-bold">ระบบสารบัญอิเล็กทรอนิกส์</h1>
<p class="text-xs text-gray-300">องค์การบริหารส่วนตำบลชำผักแพว</p>
</div>

<div class="p-4">

<!-- SEARCH -->
<input placeholder="ค้นหา..." class="w-full p-3 rounded-xl mb-4 border">

<!-- 📌 TITLE -->
<h2 class="font-bold text-gray-700 mb-2">
📄 หนังสือสำคัญประจำเดือน
</h2>

<!-- SLIDER -->
<div class="bg-white p-3 rounded-xl shadow">

<div id="slider" class="slider aspect-[210/297]">

<div id="track" class="slide-track">

<img src="https://picsum.photos/800/1100?1" class="slide">
<img src="https://picsum.photos/800/1100?2" class="slide">

</div>

</div>

<!-- ADMIN ADD -->
<div class="mt-3 flex gap-2">
<input id="imgUrl" placeholder="วางลิงก์ Google Drive" class="flex-1 border p-2 rounded">
<button onclick="addSlide()" class="bg-blue-600 text-white px-4 rounded">เพิ่ม</button>
</div>

</div>

</div>
</div>

<!-- FULLSCREEN VIEW -->
<div id="viewer" class="hidden fixed inset-0 bg-black flex items-center justify-center z-50">
<img id="viewerImg" class="max-h-full max-w-full">
</div>

<script>

// SIDEBAR
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("-translate-x-full");
}

// SLIDER TOUCH
let track=document.getElementById("track");
let index=0;
let startX=0;

track.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

track.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX-endX>50) next();
if(endX-startX>50) prev();
});

function next(){
if(index<track.children.length-1) index++;
updateSlide();
}

function prev(){
if(index>0) index--;
updateSlide();
}

function updateSlide(){
track.style.transform=`translateX(-${index*100}%)`;
}

// AUTO SLIDE
setInterval(()=>{
index=(index+1)%track.children.length;
updateSlide();
},8000);

// CLICK TO ZOOM
document.querySelectorAll(".slide").forEach(img=>{
img.onclick=()=>{
viewer.classList.remove("hidden");
viewerImg.src=img.src;
}
});

viewer.onclick=()=>viewer.classList.add("hidden");

// 📌 แปลงลิงก์ Google Drive
function convertDrive(url){
if(url.includes("drive.google.com")){
let id=url.split("/d/")[1].split("/")[0];
return `https://drive.google.com/uc?export=view&id=${id}`;
}
return url;
}

// ADD IMAGE
function addSlide(){
let url=document.getElementById("imgUrl").value;
if(!url) return;

let img=document.createElement("img");
img.src=convertDrive(url);
img.className="slide";

img.onclick=()=>{
viewer.classList.remove("hidden");
viewerImg.src=img.src;
}

track.appendChild(img);
document.getElementById("imgUrl").value="";
}

</script>

</body>
</html>
