<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSaraban v5.1 (Fixed & Integrated)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body{background:#f4f7f9; font-family: sans-serif;}
        #sidebar{transition: transform 0.3s ease-in-out; z-index: 50;}
        #content{transition: margin 0.3s ease-in-out;}
        .modal{backdrop-filter: blur(8px); z-index: 100;}
        .page-content { display: none; }
        .page-active { display: block; }
        .menu-item { cursor: pointer; transition: 0.2s; color: #bfdbfe; }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: #ffffff; }
        .menu-active { background: #facc15 !important; color: #1e3a8a !important; font-weight: bold; }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }

        @keyframes slideUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .toast-enter { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>

<div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-[#1e3a8a] text-white p-5 shadow-2xl transform -translate-x-full lg:translate-x-0">
    <div class="flex justify-between items-center mb-8">
        <h1 class="font-bold text-2xl tracking-tight text-white">eSaraban</h1>
        <button onclick="toggleSidebar()" class="hover:text-yellow-400 lg:hidden text-2xl">✕</button>
    </div>
    <nav>
        <ul id="menuList" class="space-y-2">
            <li onclick="showPage('home')" id="menu-home" class="menu-item menu-active p-3 rounded-lg flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                <span>หน้าหลัก</span>
            </li>
            <li onclick="showPage('receive')" id="menu-receive" class="menu-item p-3 rounded-lg flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
                <span>หนังสือรับ</span>
            </li>
            <li onclick="showPage('send')" id="menu-send" class="menu-item p-3 rounded-lg flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                <span>หนังสือส่ง</span>
            </li>
            <li class="menu-item p-3 rounded-lg flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <span>ใบคำร้อง</span>
            </li>
        </ul>
    </nav>
</div>

<div id="content" class="lg:ml-64 min-h-screen flex flex-col transition-all duration-300">
    <header class="bg-[#1e3a8a] text-white p-4 flex justify-between items-center sticky top-0 shadow-md z-40">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-2xl lg:hidden block">☰</button>
            <div class="flex flex-col justify-center">
                <h1 class="font-bold text-lg md:text-xl leading-tight">ระบบสารบัญอิเล็กทรอนิกส์</h1>
                <p class="text-sm text-blue-200 tracking-wide mt-0.5">องค์การบริหารส่วนตำบลชำผักแพว</p>
            </div>
        </div>
        <button id="authBtn" onclick="handleAuthToggle()" class="bg-yellow-400 text-[#1e3a8a] px-6 py-2 rounded-full font-bold shadow-sm hover:bg-white transition-all">GUEST</button>
    </header>

    <main class="p-4 md:p-6 flex-1 w-full mx-auto max-w-[1600px]">
        <div id="page-receive" class="page-content page-active space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-800">📥 หนังสือรับ</h2>
                <button onclick="openAddDocModal()" class="admin-only hidden bg-[#0d6efd] text-white px-5 py-2.5 rounded-lg hover:bg-blue-700 transition flex items-center gap-2 font-medium shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg> เพิ่มหนังสือรับ
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border p-5 grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="searchInput" oninput="renderTable()" placeholder="ค้นหาเลขรับ, ชื่อเรื่อง, จาก" class="h-11 px-4 rounded-lg border focus:border-blue-500 outline-none text-sm">
                <select id="filterType" onchange="renderTable()" class="h-11 px-3 rounded-lg border text-sm"><option value="">ประเภททั้งหมด</option><option>เมลสารบัญ</option><option>จดหมาย</option><option>ด้วยตัวเอง</option></select>
                <select id="filterSpeed" onchange="renderTable()" class="h-11 px-3 rounded-lg border text-sm"><option value="">ความเร็วทั้งหมด</option><option>ปกติ</option><option>ด่วน</option><option>ด่วนมาก</option><option>ด่วนที่สุด</option></select>
                <select id="filterCat" onchange="renderTable()" class="h-11 px-3 rounded-lg border text-sm"><option value="">หมวดหมู่ทั้งหมด</option><option>ทั่วไป</option><option>การเงิน</option><option>อบรม</option><option>ประชาสัมพันธ์</option><option>ประกาศ</option><option>เอกสารสำคัญ</option></select>
            </div>

            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-gray-50 text-gray-600 text-sm font-semibold border-b">
                            <tr>
                                <th class="p-4">เลขรับ</th><th class="p-4">วันที่ลงรับ</th><th class="p-4">จาก</th><th class="p-4 w-1/3">ชื่อเรื่อง</th>
                                <th class="p-4">ผู้รับผิดชอบ</th><th class="p-4 text-center">สถานะ</th><th class="p-4 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="desktopTableBody" class="text-sm divide-y">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div id="page-home" class="page-content text-center py-20">หน้าหลัก</div>
    </main>
</div>

<div id="addDocModal" class="hidden modal fixed inset-0 bg-black/40 flex items-center justify-center p-4 sm:p-6 z-50">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[95vh] overflow-y-auto p-6 md:p-8">
        <div class="flex justify-between items-start mb-8 border-b pb-6">
            <h2 class="text-2xl font-bold text-gray-800">ลงระบบหนังสือรับ</h2>
            <button onclick="closeAddDocModal()" class="text-gray-400 text-2xl">✕</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div><label class="block text-sm font-bold mb-2">เลขรับ <span class="text-red-500">*</span></label><input type="text" id="inputDocNum" class="w-full p-3.5 rounded-xl border"></div>
            <div><label class="block text-sm font-bold mb-2">วันที่ออกหนังสือ</label><input type="date" id="inputDocIssueDate" class="w-full p-3.5 rounded-xl border"></div>
            <div><label class="block text-sm font-bold mb-2">วันที่ลงรับ <span class="text-red-500">*</span></label><input type="date" id="inputDocDate" class="w-full p-3.5 rounded-xl border"></div>
            <div><label class="block text-sm font-bold mb-2">จาก <span class="text-red-500">*</span></label><input type="text" id="inputDocFrom" class="w-full p-3.5 rounded-xl border"></div>
            <div class="md:col-span-2"><label class="block text-sm font-bold mb-2">ชื่อเรื่อง <span class="text-red-500">*</span></label><input type="text" id="inputDocTitle" class="w-full p-3.5 rounded-xl border"></div>
            <div><label class="block text-sm font-bold mb-2">ประเภทหนังสือ</label><select id="inputType" class="w-full p-3.5 rounded-xl border"><option value="">เลือกประเภท</option><option>เมลสารบัญ</option><option>จดหมาย</option><option>ด้วยตัวเอง</option></select></div>
            <div><label class="block text-sm font-bold mb-2">ชั้นความเร็ว</label><select id="inputSpeed" class="w-full p-3.5 rounded-xl border"><option value="">ปกติ</option><option>ด่วน</option><option>ด่วนมาก</option><option>ด่วนที่สุด</option></select></div>
            <div><label class="block text-sm font-bold mb-2">ผู้รับผิดชอบ</label>
                <select id="inputPerson" class="w-full p-3.5 rounded-xl border">
                    <option value="">เลือกผู้รับผิดชอบ</option>
                    <option>สำนักปลัด</option>
                    <option>กองคลัง</option>
                    <option>กองช่าง</option>
                    <option>กองการศึกษา ศาสนา และวัฒนธรรม</option>
                    <option>กองสาธารณสุขและสิ่งแวดล้อม</option>
                    <option>กองสวัสดิการสังคม</option>
                    <option>กองส่งเสริมการเกษตร</option>
                </select>
            </div>
            <div><label class="block text-sm font-bold mb-2">หมวดหมู่</label><select id="inputCategory" class="w-full p-3.5 rounded-xl border"><option value="">เลือกหมวดหมู่</option><option>ทั่วไป</option><option>การเงิน</option><option>อบรม</option><option>ประชาสัมพันธ์</option><option>ประกาศ</option><option>เอกสารสำคัญ</option></select></div>
            <div class="md:col-span-2"><label class="block text-sm font-bold mb-2">ลิงก์ Google Drive</label><input type="url" id="inputDriveLink" class="w-full p-3.5 rounded-xl border" placeholder="https://drive.google.com/..."></div>
        </div>
        <div class="flex justify-end gap-3 mt-8 pt-6 border-t">
            <button onclick="closeAddDocModal()" class="px-6 py-3 bg-gray-100 rounded-xl font-bold">ยกเลิก</button>
            <button id="btnSave" onclick="saveNewDoc()" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">บันทึกข้อมูล</button>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyjve7y30MoL6RF4H4kcI0DAAMx5s38PIY7pdog1MlaY46tJ5hhgFoI9VbhQGciLGE/exec";
    let isAdmin = false, isOpen = false, allData = [];

    window.onload = () => {
        loadDataFromSheet();
        if(window.innerWidth >= 1024) toggleSidebar();
        updateUI();
    };

    async function loadDataFromSheet() {
        try {
            const response = await fetch(WEB_APP_URL);
            allData = await response.json();
            renderTable();
        } catch(e) { console.error("Load failed", e); }
    }

    function renderTable() {
        const tbody = document.getElementById("desktopTableBody");
        const search = document.getElementById("searchInput").value.toLowerCase();
        const type = document.getElementById("filterType").value;
        const speed = document.getElementById("filterSpeed").value;
        
        tbody.innerHTML = "";
        
        // กรองข้อมูลและแสดงผล (เอาล่าสุดขึ้นก่อน)
        allData.slice().reverse().forEach(row => {
            const matchSearch = row["เลขรับ"]?.toLowerCase().includes(search) || row["ชื่อเรื่อง"]?.toLowerCase().includes(search) || row["จาก"]?.toLowerCase().includes(search);
            const matchType = !type || row["ประเภทหนังสือ"] === type;
            const matchSpeed = !speed || row["ชั้นความเร็ว"] === speed;

            if(matchSearch && matchType && matchSpeed) {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="p-4 font-medium">${row["เลขรับ"] || '-'}</td>
                    <td class="p-4">${row["วันที่ลงรับ"] || '-'}</td>
                    <td class="p-4">${row["จาก"] || '-'}</td>
                    <td class="p-4 font-medium truncate max-w-md">${row["ชื่อเรื่อง"] || '-'}</td>
                    <td class="p-4 text-gray-500">${row["ผู้รับผิดชอบ"] || '-'}</td>
                    <td class="p-4 text-center"><span class="px-2 py-1 bg-green-50 text-green-600 rounded text-xs">ลงรับแล้ว</span></td>
                    <td class="p-4 text-center">
                        ${row["ลิงก์ Google Drive"] ? `<a href="${row["ลิงก์ Google Drive"]}" target="_blank" class="text-blue-600">📁</a>` : '-'}
                    </td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    async function saveNewDoc() {
        const btn = document.getElementById("btnSave");
        const payload = {
            docNum: document.getElementById("inputDocNum").value,
            docDateIn: document.getElementById("inputDocDate").value,
            docFrom: document.getElementById("inputDocFrom").value,
            docTitle: document.getElementById("inputDocTitle").value,
            docType: document.getElementById("inputType").value,
            docSpeed: document.getElementById("inputSpeed").value,
            docOwner: document.getElementById("inputPerson").value,
            docCategory: document.getElementById("inputCategory").value,
            docLink: document.getElementById("inputDriveLink").value,
            docDateOut: document.getElementById("inputDocIssueDate").value
        };

        if(!payload.docNum || !payload.docTitle) return alert("กรุณากรอกเลขรับและชื่อเรื่อง");

        btn.disabled = true; btn.innerText = "กำลังบันทึก...";

        try {
            // ส่งข้อมูลแบบ no-cors (จะไม่สามารถอ่าน response ได้ แต่ข้อมูลจะเข้า Sheet)
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            
            alert("บันทึกข้อมูลเรียบร้อยแล้ว!");
            closeAddDocModal();
            location.reload(); // โหลดหน้าใหม่เพื่อดึงข้อมูลล่าสุด
        } catch(e) {
            alert("เกิดข้อผิดพลาดในการส่งข้อมูล");
            btn.disabled = false; btn.innerText = "บันทึกข้อมูล";
        }
    }

    function toggleSidebar() {
        const s = document.getElementById("sidebar"), c = document.getElementById("content");
        isOpen = !isOpen;
        s.style.transform = isOpen ? "translateX(0)" : "translateX(-100%)";
        if(window.innerWidth >= 1024) c.style.marginLeft = isOpen ? "16rem" : "0";
    }

    function handleAuthToggle() {
        if(!isAdmin) {
            const p = prompt("กรอกรหัสผ่าน Admin:");
            if(p === "1234") { isAdmin = true; updateUI(); }
        } else { isAdmin = false; updateUI(); }
    }

    function updateUI() {
        const btn = document.getElementById("authBtn");
        const adminEls = document.querySelectorAll(".admin-only");
        btn.innerText = isAdmin ? "ADMIN MODE" : "GUEST";
        btn.className = isAdmin ? "bg-red-500 text-white px-6 py-2 rounded-full font-bold shadow-sm" : "bg-yellow-400 text-[#1e3a8a] px-6 py-2 rounded-full font-bold shadow-sm";
        adminEls.forEach(el => isAdmin ? el.classList.remove('hidden') : el.classList.add('hidden'));
    }

    function showPage(id) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('page-active'));
        document.getElementById('page-' + id).classList.add('page-active');
    }

    function openAddDocModal() { document.getElementById("addDocModal").classList.remove("hidden"); }
    function closeAddDocModal() { document.getElementById("addDocModal").classList.add("hidden"); }
</script>

</body>
</html>
